services:
  - type: web
    name: ecommerce-app
    env: node
    region: oregon
    buildCommand: npm install && cd frontend && npm install && npm run build
    startCommand: node backend/server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production